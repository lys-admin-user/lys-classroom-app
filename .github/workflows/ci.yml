name: CI

# Ready-to-enable CI. GitHub is not connected yet; once the repo is pushed to
# GitHub this workflow runs automatically on pushes and pull requests.
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npx vitest run

      - name: Dependency audit gate
        run: node scripts/audit-deps.mjs
